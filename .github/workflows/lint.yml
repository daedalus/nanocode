name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv pip install --system -e ".[lint]"
      - name: Run ruff format
        run: ruff format --check nanocode/ tests/
      - name: Run ruff
        run: ruff check nanocode/ tests/
      - name: Run mypy
        run: mypy nanocode/